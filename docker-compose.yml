# Whisper ASR API — Docker Compose
# =============================================================================
# NOTE: AutoDL does NOT support Docker. Use deploy.sh for AutoDL.
# This is for standard GPU server deployments with nvidia-docker.
# =============================================================================
#
# Usage:
#   1. Copy .env.example to .env and configure
#   2. Place your CTranslate2 model in ./models/whisper-large-v3-turbo-ct2/
#      OR set MODEL_DOWNLOAD_URL in .env
#   3. docker compose up -d
#
# Model volume: mount your model directory to /app/models

version: "3.8"

services:
  whisper-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-asr-api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - MODEL_PATH=${MODEL_PATH:-/app/models/whisper-large-v3-turbo-ct2}
      - MODEL_COMPUTE_TYPE=${MODEL_COMPUTE_TYPE:-float16}
      - MODEL_DEVICE=${MODEL_DEVICE:-cuda}
      - MODEL_DEVICE_INDEX=${MODEL_DEVICE_INDEX:-0}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-zh}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-524288000}
      - MAX_AUDIO_DURATION=${MAX_AUDIO_DURATION:-600}
      - VAD_ENABLED=${VAD_ENABLED:-true}
      - VAD_THRESHOLD=${VAD_THRESHOLD:-0.5}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - API_KEYS=${API_KEYS:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - TEMP_DIR=/tmp/whisper_api
    volumes:
      # Mount your model directory
      - ${MODEL_PATH:-./models/whisper-large-v3-turbo-ct2}:/app/models/whisper-large-v3-turbo-ct2:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
